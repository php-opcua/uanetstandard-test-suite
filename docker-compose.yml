services:

  # === Certificate Generator (runs first) ===
  certs-generator:
    image: alpine:3.19
    volumes:
      - ./certs:/certs
      - ./scripts:/scripts
    entrypoint: ["/bin/sh", "/scripts/generate-certs.sh"]

  # === Server 1: No Security (Port 4840) ===
  # Basic connectivity testing, no encryption, anonymous only
  opcua-no-security:
    build: .
    ports:
      - "4840:4840"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4840"
      OPCUA_SERVER_NAME: "NoSecurityServer"
      OPCUA_SECURITY_POLICIES: "None"
      OPCUA_SECURITY_MODES: "None"
      OPCUA_ALLOW_ANONYMOUS: "true"
      OPCUA_AUTH_USERS: "false"
      OPCUA_AUTH_CERTIFICATE: "false"
      OPCUA_AUTO_ACCEPT_CERTS: "true"
      OPCUA_MAX_NODES_PER_READ: "5"
      OPCUA_MAX_NODES_PER_WRITE: "5"
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "dotnet", "TestServer.dll", "--health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # === Server 2: Username/Password (Port 4841) ===
  # Encrypted channel with credential-based authentication
  opcua-userpass:
    build: .
    ports:
      - "4841:4841"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4841"
      OPCUA_SERVER_NAME: "UserPassServer"
      OPCUA_SECURITY_POLICIES: "Basic256Sha256"
      OPCUA_SECURITY_MODES: "SignAndEncrypt"
      OPCUA_ALLOW_ANONYMOUS: "false"
      OPCUA_AUTH_USERS: "true"
      OPCUA_AUTH_CERTIFICATE: "false"
      OPCUA_AUTO_ACCEPT_CERTS: "true"
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    restart: unless-stopped

  # === Server 3: Certificate Auth (Port 4842) ===
  # Multiple security policies, X.509 certificate authentication
  opcua-certificate:
    build: .
    ports:
      - "4842:4842"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4842"
      OPCUA_SERVER_NAME: "CertificateServer"
      OPCUA_SECURITY_POLICIES: "Basic256Sha256,Aes128_Sha256_RsaOaep,Aes256_Sha256_RsaPss"
      OPCUA_SECURITY_MODES: "Sign,SignAndEncrypt"
      OPCUA_ALLOW_ANONYMOUS: "false"
      OPCUA_AUTH_USERS: "false"
      OPCUA_AUTH_CERTIFICATE: "true"
      OPCUA_AUTO_ACCEPT_CERTS: "false"
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    restart: unless-stopped

  # === Server 4: All Security (Port 4843) ===
  # All 6 security policies, all 3 modes, all auth methods
  opcua-all-security:
    build: .
    ports:
      - "4843:4843"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4843"
      OPCUA_SERVER_NAME: "AllSecurityServer"
      OPCUA_SECURITY_POLICIES: "None,Basic128Rsa15,Basic256,Basic256Sha256,Aes128_Sha256_RsaOaep,Aes256_Sha256_RsaPss"
      OPCUA_SECURITY_MODES: "None,Sign,SignAndEncrypt"
      OPCUA_ALLOW_ANONYMOUS: "true"
      OPCUA_AUTH_USERS: "true"
      OPCUA_AUTH_CERTIFICATE: "true"
      OPCUA_AUTO_ACCEPT_CERTS: "true"
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    restart: unless-stopped

  # === Server 5: Discovery Server (Port 4844) ===
  # OPC UA Discovery (FindServers, GetEndpoints)
  opcua-discovery:
    build: .
    ports:
      - "4844:4844"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4844"
      OPCUA_SERVER_NAME: "DiscoveryServer"
      OPCUA_RESOURCE_PATH: ""
      OPCUA_SECURITY_POLICIES: "None,Basic256Sha256"
      OPCUA_SECURITY_MODES: "None,SignAndEncrypt"
      OPCUA_ALLOW_ANONYMOUS: "true"
      OPCUA_AUTH_USERS: "false"
      OPCUA_AUTH_CERTIFICATE: "false"
      OPCUA_IS_DISCOVERY: "true"
      OPCUA_AUTO_ACCEPT_CERTS: "true"
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    restart: unless-stopped

  # === Server 6: Auto-Accept Certs (Port 4845) ===
  # Automatically trusts all client certificates
  opcua-auto-accept:
    build: .
    ports:
      - "4845:4845"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4845"
      OPCUA_SERVER_NAME: "AutoAcceptServer"
      OPCUA_SECURITY_POLICIES: "Basic256Sha256"
      OPCUA_SECURITY_MODES: "SignAndEncrypt"
      OPCUA_ALLOW_ANONYMOUS: "true"
      OPCUA_AUTH_USERS: "true"
      OPCUA_AUTH_CERTIFICATE: "true"
      OPCUA_AUTO_ACCEPT_CERTS: "true"
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    restart: unless-stopped

  # === Server 7: Sign Only (Port 4846) ===
  # Message signing without encryption
  opcua-sign-only:
    build: .
    ports:
      - "4846:4846"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4846"
      OPCUA_SERVER_NAME: "SignOnlyServer"
      OPCUA_SECURITY_POLICIES: "Basic256Sha256"
      OPCUA_SECURITY_MODES: "Sign"
      OPCUA_ALLOW_ANONYMOUS: "true"
      OPCUA_AUTH_USERS: "true"
      OPCUA_AUTH_CERTIFICATE: "false"
      OPCUA_AUTO_ACCEPT_CERTS: "true"
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    restart: unless-stopped

  # === Server 8: Legacy Security (Port 4847) ===
  # Deprecated security policies for backward compatibility testing
  opcua-legacy:
    build: .
    ports:
      - "4847:4847"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4847"
      OPCUA_SERVER_NAME: "LegacySecurityServer"
      OPCUA_SECURITY_POLICIES: "Basic128Rsa15,Basic256"
      OPCUA_SECURITY_MODES: "Sign,SignAndEncrypt"
      OPCUA_ALLOW_ANONYMOUS: "true"
      OPCUA_AUTH_USERS: "true"
      OPCUA_AUTH_CERTIFICATE: "false"
      OPCUA_AUTO_ACCEPT_CERTS: "true"
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    restart: unless-stopped

  # === Server 9: ECC NIST (Port 4848) ===
  # ECC security with NIST P-256 and P-384 curves
  opcua-ecc-nist:
    build: .
    ports:
      - "4848:4848"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4848"
      OPCUA_SERVER_NAME: "EccNistServer"
      OPCUA_SECURITY_POLICIES: "ECC_nistP256,ECC_nistP384"
      OPCUA_SECURITY_MODES: "Sign,SignAndEncrypt"
      OPCUA_ALLOW_ANONYMOUS: "true"
      OPCUA_AUTH_USERS: "true"
      OPCUA_AUTH_CERTIFICATE: "true"
      OPCUA_AUTO_ACCEPT_CERTS: "true"

    depends_on:
      certs-generator:
        condition: service_completed_successfully
    restart: unless-stopped

  # === Server 10: ECC Brainpool (Port 4849) ===

  # ECC security with Brainpool P-256r1 and P-384r1 curves (European standard)
  opcua-ecc-brainpool:
    build: .
    ports:
      - "4849:4849"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4849"
      OPCUA_SERVER_NAME: "EccBrainpoolServer"
      OPCUA_SECURITY_POLICIES: "ECC_brainpoolP256r1,ECC_brainpoolP384r1"
      OPCUA_SECURITY_MODES: "Sign,SignAndEncrypt"
      OPCUA_ALLOW_ANONYMOUS: "true"
      OPCUA_AUTH_USERS: "true"
      OPCUA_AUTH_CERTIFICATE: "true"
      OPCUA_AUTO_ACCEPT_CERTS: "true"

    depends_on:
      certs-generator:
        condition: service_completed_successfully
    restart: unless-stopped

  # === Server 11: Security Key Service (Port 4851) ===
  # Classic OPC UA server exposing GetSecurityKeys (Part 14 §8.4.2) under
  # TestServer/SecurityKeyService. Lets subscriber-side clients
  # (e.g. php-opcua/opcua-client-ext-pubsub's SksGroupKeyProvider)
  # exercise the real RPC path against a live server instead of only
  # MockClient. Key material is hardcoded via env — this is a test
  # server, not a production SKS.
  opcua-sks:
    build: .
    ports:
      - "4851:4851"
    volumes:
      - ./certs:/app/certs
      - ./config:/app/config:ro
    environment:
      OPCUA_PORT: "4851"
      OPCUA_SERVER_NAME: "SecurityKeyServiceServer"
      OPCUA_SECURITY_POLICIES: "None"
      OPCUA_SECURITY_MODES: "None"
      OPCUA_ALLOW_ANONYMOUS: "true"
      OPCUA_AUTH_USERS: "false"
      OPCUA_AUTH_CERTIFICATE: "false"
      OPCUA_AUTO_ACCEPT_CERTS: "true"
      OPCUA_ENABLE_SKS: "true"
      OPCUA_SKS_GROUP_ID: "test-group"
      OPCUA_SKS_POLICY_URI: "http://opcfoundation.org/UA/SecurityPolicy#PubSub-Aes256-CTR"
      OPCUA_SKS_TOKEN_ID: "7"
      OPCUA_SKS_SIGNING_KEY_HEX: "0101010101010101010101010101010101010101010101010101010101010101"
      OPCUA_SKS_ENCRYPTING_KEY_HEX: "0202020202020202020202020202020202020202020202020202020202020202"
      OPCUA_SKS_KEY_NONCE_HEX: "03030303"
      OPCUA_SKS_TIME_TO_NEXT_KEY_MS: "300000"
      OPCUA_SKS_KEY_LIFETIME_MS: "600000"
    depends_on:
      certs-generator:
        condition: service_completed_successfully
    restart: unless-stopped

  # === Server 12: PubSub UDP + UADP Publisher (Port 4850 internal) ===
  # UA-.NETStandard publisher emitting a deterministic DataSet every
  # 500 ms. Sends unicast UADP to the companion `opcua-pubsub-relay`
  # sidecar on the shared `pubsub-net` bridge; the relay forwards to the
  # physical host on UDP port 14850 via `host.docker.internal`.
  #
  # This deliberate two-step path sidesteps platform-specific multicast
  # behaviour:
  #   - Linux + Docker Engine (GitHub Actions, bare metal): works.
  #   - Docker Desktop (Linux / macOS / Windows): works.
  # The bridge is compose-scoped, so inter-container DNS resolves
  # `opcua-pubsub-relay` to the relay's container IP automatically.
  #
  # All knobs are env-overridable via standard compose variable
  # substitution.
  opcua-pubsub:
    build:
      context: .
      dockerfile: Dockerfile.publisher
    networks:
      - pubsub-net
    environment:
      OPCUA_URL: "${OPCUA_URL:-opc.udp://opcua-pubsub-relay:4850}"
      OPCUA_NETWORK_INTERFACE: "${OPCUA_NETWORK_INTERFACE-}"
      OPCUA_PUBLISHER_ID: "${OPCUA_PUBLISHER_ID:-100}"
      OPCUA_WRITER_GROUP_ID: "${OPCUA_WRITER_GROUP_ID:-1}"
      OPCUA_DATASET_WRITER_ID: "${OPCUA_DATASET_WRITER_ID:-1}"
      OPCUA_DATASET_NAME: "${OPCUA_DATASET_NAME:-Simple}"
      OPCUA_PUBLISH_INTERVAL_MS: "${OPCUA_PUBLISH_INTERVAL_MS:-500}"
      OPCUA_TICK_INTERVAL_MS: "${OPCUA_TICK_INTERVAL_MS:-250}"
      OPCUA_LOG_LEVEL: "${OPCUA_LOG_LEVEL:-Information}"
    depends_on:
      - opcua-pubsub-relay
    restart: unless-stopped

  # === PubSub relay sidecar (Port 14850 on the physical host) ===
  # Stateless socat forwarder that receives the UADP unicast packets
  # emitted by `opcua-pubsub` on the bridge and re-sends them to
  # `host.docker.internal:14850` so subscriber-side tests running on the
  # physical host can listen on 127.0.0.1:14850.
  opcua-pubsub-relay:
    image: alpine/socat:latest
    networks:
      - pubsub-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - -u
      - UDP-RECV:4850,reuseaddr
      - UDP-DATAGRAM:host.docker.internal:${OPCUA_PUBSUB_HOST_PORT:-14850}
    restart: unless-stopped

networks:
  pubsub-net:
    driver: bridge
